<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Manager (Pure Web)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen w-full flex flex-col bg-gray-50 text-gray-800 overflow-hidden">
    <!-- Header -->
    <div class="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">S</div>
            <h1 class="text-lg font-semibold text-gray-900">Skills Manager <span class="text-xs bg-gray-100 text-gray-500 px-2 py-1 rounded ml-2">纯前端版</span></h1>
        </div>
        <button id="sync-all-btn" class="px-4 py-1.5 bg-blue-600 text-white rounded-md text-sm font-medium hover:bg-blue-700 transition-colors shadow-sm hidden">
            开始同步文件 (Copy)
        </button>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <div class="w-72 bg-gray-100 border-r border-gray-200 p-4 flex flex-col overflow-y-auto">
            
            <div class="mb-6">
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">1. 中心库配置 (必选)</h2>
                <div class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm">
                    <p class="text-xs text-gray-500 mb-2">选择你的 Skills 集中存放目录</p>
                    <button id="select-central-btn" class="w-full py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded text-sm font-medium hover:bg-blue-100">
                        + 授权中心库目录
                    </button>
                    <p id="central-path-display" class="text-xs text-green-600 mt-2 font-mono break-all hidden">✓ 已授权</p>
                </div>
            </div>

            <div>
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">2. AI 工具环境授权 (多选)</h2>
                <div class="space-y-3">
                    <!-- Claude Code -->
                    <div class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-sm font-bold text-gray-800">Claude Code</span>
                            <span id="claude-status" class="text-[10px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-medium">未授权</span>
                        </div>
                        <p class="text-xs text-gray-500 mb-2">请选择 ~/.claude/skills 目录</p>
                        <button id="select-claude-btn" class="w-full py-1.5 bg-gray-50 border border-gray-200 text-gray-600 rounded text-xs font-medium hover:bg-gray-100">
                            选择目录
                        </button>
                    </div>
                    
                    <!-- Codex -->
                    <div class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-sm font-bold text-gray-800">Codex</span>
                            <span id="codex-status" class="text-[10px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-medium">未授权</span>
                        </div>
                        <p class="text-xs text-gray-500 mb-2">请选择 ~/.codex/skills 目录</p>
                        <button id="select-codex-btn" class="w-full py-1.5 bg-gray-50 border border-gray-200 text-gray-600 rounded text-xs font-medium hover:bg-gray-100">
                            选择目录
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-8 bg-white flex flex-col relative">
            <h2 class="text-xl font-bold text-gray-800 mb-6">我的中心库 Skills</h2>
            
            <!-- 未授权提示遮罩 -->
            <div id="unauth-overlay" class="absolute inset-0 z-10 bg-white/80 backdrop-blur-sm flex items-center justify-center">
                <div class="text-center max-w-sm">
                    <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path></svg>
                    </div>
                    <h3 class="text-lg font-bold text-gray-900 mb-2">浏览器沙箱保护</h3>
                    <p class="text-sm text-gray-500 mb-4">纯前端应用需要您手动授予本地文件夹的读写权限。请在左侧点击“授权中心库目录”以加载您的技能列表。</p>
                </div>
            </div>

            <!-- 文件列表区 -->
            <div id="skills-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
                <!-- 动态生成的卡片将在这里渲染 -->
            </div>
        </div>
    </div>

    <!-- UI Interaction Logic -->
    <script>
        let centralHandle = null;
        let toolHandles = {
            claude: null,
            codex: null
        };

        const DUMMY_DATA = [
            { name: "lint_checker.py", desc: "代码规范检查", linked: ["claude"] },
            { name: "api_doc_gen.py", desc: "自动生成 API 文档", linked: [] }
        ];

        // 模拟渲染文件列表
        function renderSkills() {
            document.getElementById('unauth-overlay').classList.add('hidden');
            const list = document.getElementById('skills-list');
            list.classList.remove('hidden');
            document.getElementById('sync-all-btn').classList.remove('hidden');
            
            list.innerHTML = DUMMY_DATA.map(skill => `
                <div class="border border-gray-200 rounded-lg p-4 flex flex-col h-32 hover:border-blue-300 hover:shadow-md transition-all bg-white">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-gray-800 text-sm truncate" title="${skill.name}">${skill.name}</h3>
                        <div class="flex gap-1">
                            <button class="text-xs px-2 py-1 bg-gray-100 hover:bg-gray-200 rounded text-gray-600">编辑</button>
                            <button class="text-xs px-2 py-1 bg-red-50 hover:bg-red-100 rounded text-red-600">删除</button>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 line-clamp-2 mb-3 flex-1">${skill.desc}</p>
                    <div class="flex items-center justify-between pt-2 border-t border-gray-100">
                        <div class="flex gap-1">
                            <span class="text-[10px] ${skill.linked.includes('claude') ? 'bg-orange-100 text-orange-700' : 'bg-gray-100 text-gray-400'} px-1.5 py-0.5 rounded">Claude</span>
                            <span class="text-[10px] ${skill.linked.includes('codex') ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-400'} px-1.5 py-0.5 rounded">Codex</span>
                        </div>
                        <button class="text-xs text-blue-600 font-medium hover:underline">分配环境</button>
                    </div>
                </div>
            `).join('');
        }

        // 获取目录权限的通用逻辑 (File System Access API)
        async function requestDirectory() {
            try {
                if (!window.showDirectoryPicker) {
                    alert("您的浏览器不支持 File System Access API，请使用最新版 Chrome 或 Edge！");
                    return null;
                }
                const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
                return handle;
            } catch (err) {
                console.log("用户取消或授权失败", err);
                return null;
            }
        }

        // 绑定按钮事件
        document.getElementById('select-central-btn').addEventListener('click', async () => {
            const handle = await requestDirectory();
            if (handle) {
                centralHandle = handle;
                document.getElementById('central-path-display').classList.remove('hidden');
                document.getElementById('central-path-display').textContent = `✓ 授权成功: ${handle.name}`;
                renderSkills(); // 授权后渲染卡片
            }
        });

        document.getElementById('select-claude-btn').addEventListener('click', async () => {
            const handle = await requestDirectory();
            if (handle) {
                toolHandles.claude = handle;
                const status = document.getElementById('claude-status');
                status.textContent = "已授权";
                status.className = "text-[10px] bg-green-100 text-green-600 px-1.5 py-0.5 rounded font-medium";
            }
        });

        document.getElementById('select-codex-btn').addEventListener('click', async () => {
            const handle = await requestDirectory();
            if (handle) {
                toolHandles.codex = handle;
                const status = document.getElementById('codex-status');
                status.textContent = "已授权";
                status.className = "text-[10px] bg-green-100 text-green-600 px-1.5 py-0.5 rounded font-medium";
            }
        });

        // 同步逻辑 (纯前端版本)
        document.getElementById('sync-all-btn').addEventListener('click', async () => {
            if (!centralHandle) {
                alert("请先授权中心库！");
                return;
            }
            if (!toolHandles.claude && !toolHandles.codex) {
                alert("请至少授权一个 AI 工具的目录！");
                return;
            }
            
            // 纯前端模式下的“同步”其实是读取 centralHandle 中的文件，
            // 然后向 toolHandles 写入一模一样的文件（物理拷贝）。
            alert("即将使用浏览器 File System API 将文件复制到目标环境。\\n\\n(注意: 纯前端无法创建系统软链接，只能执行物理拷贝和删除来实现同步)");
        });

    </script>
</body>
</html>
